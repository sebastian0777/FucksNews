services:
  - type: web
    name: fucksnews-votacion
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 22.15.0
      - key: DATA_DIR
        value: /var/data
    disk:
      name: votos
      mountPath: /var/data
      sizeGB: 1
